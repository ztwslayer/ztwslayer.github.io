<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Videos</title>

<style>

body{
    background:#050505;
    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;

    min-height:100vh;
    padding:40px 0;

    font-family:Arial, Helvetica, sans-serif;

    opacity:1;
    transition:opacity 0.4s ease;
    animation:fadeIn 0.4s ease-in;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

.videos-container{
    display:flex;
    flex-direction:column;
    gap:30px;
    align-items:center;
}

.video-card{
    background:#232428;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.5);
    animation:cardFade .5s ease;
}

@keyframes cardFade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.video-card h2{
    margin-bottom:20px;
}

iframe{
    width:560px;
    height:315px;
    border:none;
    border-radius:10px;
}

.home-button{
    position:fixed;
    bottom:25px;
    right:25px;

    padding:12px 25px;

    border:none;
    border-radius:10px;

    background:#f30b01;
    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
    transition:.2s;
}

.home-button:hover{
    transform:scale(1.08);
    background:#ff241a;
}

</style>
</head>

<body>

<div class="videos-container">

    <div class="video-card">
        <h2>Our FIRST Match in Chapter 7 Season 2… (Fortnite)</h2>

        <iframe
        src="https://www.youtube.com/embed/dJj96SC2E7Y"
        title="Fortnite Video"
        allowfullscreen>
        </iframe>
    </div>

    <div class="video-card">
        <h2>Calmest Deltarune Chapter 5 Reaction</h2>

        <iframe
        src="https://www.youtube.com/embed/FL_dCjirKgE"
        title="Deltarune Video"
        allowfullscreen>
        </iframe>
    </div>

</div>

<button class="home-button" onclick="goToPage('index.html')">
    Home
</button>

<script>
function goToPage(page){
    document.body.style.opacity = "0";

    setTimeout(function(){
        window.location.href = page;
    }, 400);
}
</script>

</body>
</html>
