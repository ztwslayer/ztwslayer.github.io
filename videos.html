<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Videos</title>

<style>

body{
    opacity:1;
    transition:opacity 0.4s ease;
}
    
body{
    animation: fadeIn 0.4s ease-in;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}


    
body{
    background:#050505;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

    font-family:Arial, Helvetica, sans-serif;
}

.video-card{
    animation: cardFade 0.5s ease;
}

@keyframes cardFade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
    
    
    .video-card{
    background:#232428;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.video-card h2{
    text-align:center;
    margin-bottom:20px;
    color:white;
}

<div class="video-card">

<h2>Calmest Deltarune Chapter 5 Reaction</h2>

<iframe 
src="https://www.youtube.com/embed/dJj96SC2E7Y&t=280s"
allowfullscreen>
</iframe>

</div>

    
.home-button{
    position:fixed;
    bottom:25px;
    right:25px;

    padding:12px 25px;
    border:none;
    border-radius:10px;

    background:#f30b01;
    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
    transition:0.2s;

    box-shadow:0 0 15px rgba(243,11,1,0.5);
}

.home-button:hover{
    transform:scale(1.08);
    background:#ff241a;
}

    
iframe{
    width:560px;
    height:315px;
    border-radius:10px;
    border:none;
}
</style>

</head>

<body>

</div>

<button class="home-button" onclick="goToPage('index.html')">
    Home
</button>

  <button class="home-button" onclick="goToPage('index.html')">

</button>

<script>
function goToPage(page){
    document.body.style.opacity = "0";

    setTimeout(function(){
        window.location.href = page;
    }, 400);
}
</script>

</html>
