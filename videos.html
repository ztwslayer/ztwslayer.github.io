<title>Videos</title>

<style>

body{
    opacity:1;
    transition:opacity 0.4s ease;
}
    
body{
    animation: fadeIn 0.4s ease-in;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}


    
body{
    background:#050505;
    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;

    min-height:100vh;
    padding:40px 0;

    font-family:Arial, Helvetica, sans-serif;
}

.video-card{
    animation: cardFade 0.5s ease;
}

@keyframes cardFade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
    
    
    .video-card{
    background:#232428;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.video-card h2{
    text-align:center;
    margin-bottom:20px;
    color:white;
}
