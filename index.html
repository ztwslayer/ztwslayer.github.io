<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ztwslayer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#313338;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:380px;
    background:#111214;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.banner{
    height:120px;
    background:#f30b01;
}

.profile{
    padding:0 20px 20px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    border:6px solid #111214;
    margin-top:-45px;
    background:#5865F2;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    color:white;
    font-weight:bold;
}

.username{
    margin-top:15px;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.tag{
    color:#b5bac1;
    margin-top:4px;
}

.bio{
    margin-top:18px;
    color:#dbdee1;
    line-height:1.5;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#5865F2;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

button:hover{
    background:#4752c4;
}
</style>

</head>
<body>

<div class="card">

    <div class="banner"></div>

    <div class="profile">

        <img class="avatar" src="pfp.jpg" alt="Profile Picture">

        <div class="username">ztwslayer</div>
        <div class="tag">@ztwslayer</div>

        <div class="bio">
          ramen is the goat<br>
i want to learn how to code ig bro<br><br>

• Persona 3 Reload has one of the best stories in any game I've ever played. Please play it.<br><br>

• Use code ZIFP in the Fortnite Item Shop (my friend's code)<br><br>

<i>"My eyes feel heavy..."</i>
        </div>

        <div class="buttons">
            <button onclick="window.open('https://github.com/ztwslayer')">GitHub</button>
            <button onclick="window.open('https://discord.gg/T2Ay9FTMju')">Discord Server</button>
        </div>

    </div>

</div>

</body>
</html>
