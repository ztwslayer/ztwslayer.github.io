<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ztwslayer's website</title>
<link rel="stylesheet" href="site.css">

<style id="page-styles">
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,0.20), rgba(0,0,0,0.20)),
    url("background.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.card{
    width:380px;
    background:#111214;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.banner{
    height:120px;
    background:#f30b01;
}

.profile{
    padding:0 20px 20px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    border:6px solid #111214;
    margin-top:-45px;
    background:#5865F2;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    color:white;
    font-weight:bold;
}

.username{
    margin-top:15px;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.tag{
    color:#b5bac1;
    margin-top:4px;
}

.bio{
    margin-top:18px;
    color:#dbdee1;
    line-height:1.5;
}

.buttons{
    margin-top:25px;
    display:flex;
    gap:10px;
}

.videos-button{
    position:fixed;
    bottom:25px;
    right:25px;

    padding:12px 25px;
    border:none;
    border-radius:10px;

    background:#f30b01;
    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;
    transition:0.2s;

    box-shadow:0 0 15px rgba(243,11,1,0.5);
    display:inline-flex;
    align-items:center;
    text-decoration:none;
}

.videos-button:hover{
    transform:scale(1.08);
    background:#ff241a;
}


    
button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#5865F2;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

button:hover{
    background:#4752c4;
}
</style>

</head>
<body>

<div class="site-content" data-site-content>

<div class="card">

    <div class="banner"></div>

    <div class="profile">

        <img class="avatar" src="pfp.jpg" alt="Profile Picture">

        <div class="username">ztw</div>
        <div class="tag">ztwslayer • he/him</div>

        <div class="bio">
          ramen is the goat<br>
i want to learn how to code ig bro<br><br>

• Persona 3 Reload has one of the best stories in any game I've ever played. Please play it.<br><br>

• Use code ZIFP in the Fortnite Item Shop (my friend's code)<br><br>

<i>"My eyes feel heavy..."</i>
        </div>

        <div class="buttons">
            <button onclick="window.open('https://github.com/ztwslayer')">GitHub</button>
            <button onclick="window.open('https://www.twitch.tv/ztwslayer')">Twitch</button>
            <button onclick="window.open('https://www.youtube.com/@ztwslayer')">Youtube</button>
        </div>
    
</div>
</div>

<a class="videos-button" href="videos.html">Videos</a>
</div>

<aside class="music-dock" aria-label="Music player">
    <audio id="site-music" loop preload="metadata" src="Beneath the Mask -rain-.mp3"></audio>
    <button class="music-toggle" id="music-toggle" type="button" aria-pressed="false">Play music</button>
    <span class="music-title">Beneath the Mask -rain-</span>
    <label class="visually-hidden" for="music-volume">Volume</label>
    <input class="music-volume" id="music-volume" type="range" min="0" max="1" step="0.05" value="0.2" aria-label="Music volume">
    <span class="visually-hidden" id="music-status" aria-live="polite"></span>
</aside>

<script src="site.js" defer></script>

</body>
</html>
